<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kelime Avcısı: Disleksi Eğitimi</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --accent: #2dcc70; 
            --success: #27ae60; 
            --bg: #f0f9f4; 
            --panel: #ffffff;
        }
        
        body {
            margin: 0; background: var(--bg); height: 100vh; overflow: hidden;
            font-family: 'Segoe UI', sans-serif; touch-action: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #sparkle-text {
            position: fixed; top: 5%; left: 50%; transform: translateX(-50%);
            font-size: 45px; font-weight: bold; color: #f1c40f; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            display: none; z-index: 5000; pointer-events: none;
            white-space: nowrap;
        }

        #level-indicator {
            position: fixed; top: 15px; left: 15px; background: white;
            padding: 10px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            font-weight: bold; color: #2c3e50; font-size: 16px; z-index: 1000;
            border: 2px solid var(--accent);
            text-transform: uppercase;
        }

        #drop-area {
            display: flex; gap: 15px; padding: 30px;
            background: var(--panel); border-radius: 25px; border: 4px solid var(--accent);
            min-height: 80px; justify-content: center; align-items: center;
            width: 85%; max-width: 750px; box-shadow: 0 15px 35px rgba(45, 204, 112, 0.1);
        }

        .slot { width: 130px; height: 65px; border: 2px dashed #bdc3c7; border-radius: 15px; background: #fdfdfd; }

        #word-pool { width: 100%; height: 200px; margin-top: 50px; position: relative; }

        .word {
            position: absolute; min-width: 100px; height: 65px; background: white;
            color: #2c3e50; display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: bold; border-radius: 18px; cursor: grab;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08); padding: 0 20px; 
            border: 2px solid #ecf0f1; z-index: 100; user-select: none;
        }

        .placed { 
            pointer-events: none !important; 
            border: 3px solid var(--success) !important; 
            background: #fafffa !important;
            box-shadow: none !important;
        }

        #final-screen {
            position: fixed; inset: 0; background: var(--bg); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }

        #final-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: white; padding: 50px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        /* Karakter Kutusu Düzenlemesi */
        #character-box { 
            position: relative; width: 200px; height: 200px; 
            display: flex; justify-content: center; align-items: center; margin-top: 60px;
            overflow: visible;
        }

        #child { 
            font-size: 130px; line-height: 1; 
            z-index: 10; /* Kafa altta */
            position: relative; bottom: -250px; 
            transition: bottom 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        #crown { 
            font-size: 80px; position: absolute; 
            top: -120px; /* Daha yukardan başlasın */
            opacity: 0; 
            z-index: 20; /* Taç her zaman en üstte */
            transition: all 0.7s ease-out; transition-delay: 1.2s; 
        }
    </style>
</head>
<body>

<div id="sparkle-text">HARİKA!</div>
<div id="level-indicator">YÜKLENİYOR...</div>

<div id="drop-area"></div>
<div id="word-pool"></div>

<div id="final-screen">
    <div id="final-container">
        <h1 style="color: #27ae60; margin: 0; font-size: 45px;">OYUN BİTTİ 👑</h1>
        <p style="font-size: 22px; color: #7f8c8d;">Muhteşem bir iş çıkardın!</p>
        <div id="character-box">
            <div id="crown">👑</div>
            <div id="child">🧒</div>
        </div>
    </div>
</div>

<script>
    const gameData = [
        { label: "Seviye 1: b Harfi", words: ["Beren", "balonu", "buldu."] },
        { label: "Seviye 2: d Harfi", words: ["Deniz", "dereye", "daldı."] },
        { label: "Seviye 3: p Harfi", words: ["Pelin", "pasta", "pişirdi."] },
        { label: "Seviye 4: b-d-p Karışık", words: ["Baban", "pazardan", "düdük", "aldı."] },
        { label: "Seviye 5: s Harfi", words: ["Selin", "sarı", "saat", "sattı."] },
        { label: "Seviye 6: ş Harfi", words: ["Şule", "şekerli", "şerbet", "içti."] },
        { label: "Seviye 7: s-ş Karışık", words: ["Süslü", "şemsiye", "sarı", "oldu."] },
        { label: "Seviye 8: c-ç Karışık", words: ["Cem", "çantasını", "çabuk", "açtı."] },
        { label: "Seviye 9: o-ö Karışık", words: ["Ömer", "on", "ördek", "saydı."] },
        { label: "Seviye 10: u-ü Karışık", words: ["Ülkü", "uyuyup", "rüya", "gördü."] }
    ];

    let currentLevel = 0;
    let correctInLevel = 0;

    function initLevel() {
        const data = gameData[currentLevel];
        document.getElementById('level-indicator').innerText = data.label.toUpperCase();
        
        const area = document.getElementById('drop-area');
        const pool = document.getElementById('word-pool');
        area.innerHTML = ''; pool.innerHTML = ''; correctInLevel = 0;

        data.words.forEach((_, i) => {
            const slot = document.createElement('div');
            slot.className = 'slot'; slot.id = `slot-${i}`;
            area.appendChild(slot);
        });

        const shuffled = data.words.map((text, i) => ({text, i})).sort(() => Math.random() - 0.5);
        shuffled.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'word'; el.innerText = item.text; el.id = `word-${item.i}`;
            el.style.left = (10 + (i * 22)) + '%';
            el.style.top = '50px';
            attachDrag(el); pool.appendChild(el);
        });
    }

    function attachDrag(el) {
        let dragging = false;
        let startX, startY, initialLeft, initialTop;

        el.addEventListener('pointerdown', e => {
            dragging = true;
            el.setPointerCapture(e.pointerId);
            const style = window.getComputedStyle(el);
            initialLeft = parseInt(style.left);
            initialTop = parseInt(style.top);
            startX = e.clientX;
            startY = e.clientY;
            el.style.zIndex = 1000;
        });

        el.addEventListener('pointermove', e => {
            if (!dragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            el.style.left = (initialLeft + dx) + 'px';
            el.style.top = (initialTop + dy) + 'px';
        });

        el.addEventListener('pointerup', e => {
            if (!dragging) return;
            dragging = false;
            
            const id = el.id.split('-')[1];
            const target = document.getElementById(`slot-${id}`);
            const wr = el.getBoundingClientRect();
            const tr = target.getBoundingClientRect();

            const dist = Math.hypot(
                (wr.left + wr.width/2) - (tr.left + tr.width/2), 
                (wr.top + wr.height/2) - (tr.top + tr.height/2)
            );

            if (dist < 85) {
                const poolRect = document.getElementById('word-pool').getBoundingClientRect();
                el.style.left = (tr.left - poolRect.left) + 'px';
                el.style.top = (tr.top - poolRect.top) + 'px';
                el.classList.add('placed');
                correctInLevel++;
                showSparkle();
                if(correctInLevel === gameData[currentLevel].words.length) setTimeout(next, 1500);
            } else {
                el.style.left = initialLeft + 'px';
                el.style.top = initialTop + 'px';
            }
        });
    }

    function showSparkle() {
        const sp = document.getElementById('sparkle-text');
        const phrases = ["HARİKA!", "MÜTHİŞ!", "SÜPER!", "BÖYLE DEVAM!"];
        sp.innerText = phrases[Math.floor(Math.random() * phrases.length)];
        sp.style.display = 'block';
        confetti({ particleCount: 40, spread: 60, origin: { y: 0.1 } });
        setTimeout(() => sp.style.display = 'none', 1000);
    }

    function next() {
        currentLevel++;
        if(currentLevel < gameData.length) initLevel();
        else finish();
    }

    function finish() {
        document.getElementById('final-screen').style.display = 'flex';
        const child = document.getElementById('child');
        const crown = document.getElementById('crown');
        
        // Çocuk yukarı çıkar
        setTimeout(() => { 
            child.style.bottom = '0px'; 
        }, 300);

        // Taç çocuğun tepesine (kafasının üstüne) iner
        setTimeout(() => {
            crown.style.opacity = '1';
            crown.style.top = '-50px'; // Pozisyon kafa üstüne göre ayarlandı
            confetti({ particleCount: 300, spread: 150, origin: { y: 0.5 } });
        }, 1300);
    }

    initLevel();
</script>
</body>
</html>
